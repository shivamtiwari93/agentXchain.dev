name: Publish NPM Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag in vX.Y.Z format
        required: true
        type: string

permissions:
  id-token: write
  contents: write

concurrency:
  group: npm-publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Detect existing npm publication
        id: registry
        working-directory: cli
        shell: bash
        run: |
          set -euo pipefail
          PUBLISHED_VERSION="$(npm view "agentxchain@${RELEASE_TAG#v}" version 2>/dev/null || true)"
          if [[ "${PUBLISHED_VERSION}" == "${RELEASE_TAG#v}" ]]; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "Registry already serves agentxchain@${RELEASE_TAG#v}; skipping npm publish on rerun."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Re-verify tagged release before postflight
        if: steps.registry.outputs.already_published == 'true'
        working-directory: cli
        shell: bash
        run: bash scripts/release-preflight.sh --publish-gate --target-version "${RELEASE_TAG#v}"

      - name: Verify canonical tap readiness before first publish
        if: steps.registry.outputs.already_published != 'true'
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -n "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN available — first-time publish can complete canonical tap truth."
            exit 0
          fi
          echo "::error::Release blocked before npm publish: HOMEBREW_TAP_TOKEN not configured. Canonical Homebrew tap at shivamtiwari93/homebrew-tap cannot be updated on a first-time release attempt. Configure the secret or use a manual release path that completes downstream truth."
          exit 1

      - name: Re-verify tagged release before publish
        if: steps.registry.outputs.already_published != 'true'
        working-directory: cli
        shell: bash
        run: bash scripts/release-preflight.sh --publish-gate --target-version "${RELEASE_TAG#v}"

      # Diagnostic-only: record the runner's local `npm pack` SHA before publish so
      # we can later compare it to the registry's published `dist.shasum`/`dist.integrity`.
      # This is NOT a gate — we want evidence about whether runner-local pack bytes
      # match registry bytes before designing any reproducible-publish gate. See
      # DEC-HOMEBREW-LOCAL-PACK-SHA-NOT-CANONICAL-001 (Turn 122) for why the
      # developer-machine pack SHA can differ from the registry's canonical SHA.
      - name: Record runner-local pack SHA (diagnostic)
        id: runner_pack_sha
        if: steps.registry.outputs.already_published != 'true'
        working-directory: cli
        shell: bash
        run: |
          set -euo pipefail
          PACK_DIR="${RUNNER_TEMP:-/tmp}/runner-pack-diagnostic"
          mkdir -p "$PACK_DIR"
          # `npm pack --json` prints the tarball metadata (filename, integrity, shasum, etc.)
          # without uploading. This is the same pack routine `npm publish` runs internally,
          # so the tarball bytes should match what publish-from-tag.sh produces seconds later.
          PACK_JSON="$(npm pack --json --pack-destination "$PACK_DIR" 2>&1 | tail -n +1)"
          echo "$PACK_JSON" > "$PACK_DIR/pack.json"
          TARBALL="$(node -e "const p=require('${PACK_DIR}/pack.json');process.stdout.write(p[0].filename)")"
          FULL_PATH="$PACK_DIR/$TARBALL"
          if [[ ! -f "$FULL_PATH" ]]; then
            echo "::warning::Runner pack diagnostic could not locate tarball at ${FULL_PATH}; skipping SHA capture (non-fatal)."
            echo "runner_sha1=unknown" >> "$GITHUB_OUTPUT"
            echo "runner_sha256=unknown" >> "$GITHUB_OUTPUT"
            echo "runner_integrity=unknown" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          RUNNER_SHA1="$(node -e "const p=require('${PACK_DIR}/pack.json');process.stdout.write(p[0].shasum||'')")"
          RUNNER_INTEGRITY="$(node -e "const p=require('${PACK_DIR}/pack.json');process.stdout.write(p[0].integrity||'')")"
          RUNNER_SHA256="$(sha256sum "$FULL_PATH" | awk '{print $1}')"
          echo "Runner pack tarball: $TARBALL"
          echo "Runner pack sha1 (matches registry dist.shasum):      $RUNNER_SHA1"
          echo "Runner pack integrity (matches registry dist.integrity): $RUNNER_INTEGRITY"
          echo "Runner pack sha256 (local diagnostic only):           $RUNNER_SHA256"
          echo "runner_sha1=$RUNNER_SHA1" >> "$GITHUB_OUTPUT"
          echo "runner_sha256=$RUNNER_SHA256" >> "$GITHUB_OUTPUT"
          echo "runner_integrity=$RUNNER_INTEGRITY" >> "$GITHUB_OUTPUT"

      - name: Publish tagged release
        if: steps.registry.outputs.already_published != 'true'
        working-directory: cli
        shell: bash
        run: bash scripts/publish-from-tag.sh --skip-preflight "${RELEASE_TAG}"

      - name: Verify published artifact
        working-directory: cli
        shell: bash
        env:
          RELEASE_POSTFLIGHT_RETRY_ATTEMPTS: 18
          RELEASE_POSTFLIGHT_RETRY_DELAY_SECONDS: 10
        run: bash scripts/release-postflight.sh --target-version "${RELEASE_TAG#v}"

      # Diagnostic-only: fetch the registry's published `dist.shasum` / `dist.integrity`
      # and compare with the runner-local pack SHA captured before publish. This step
      # NEVER fails the workflow — mismatch is informational, not a gate. We collect
      # this evidence first across several releases; a real gate can be designed only
      # after the data proves runner-local pack bytes match (or do not match) registry bytes.
      - name: Compare runner-local pack SHA to registry (diagnostic)
        if: always() && steps.registry.outputs.already_published != 'true'
        working-directory: cli
        shell: bash
        run: |
          set -uo pipefail
          VERSION="${RELEASE_TAG#v}"
          RUNNER_SHA1="${{ steps.runner_pack_sha.outputs.runner_sha1 }}"
          RUNNER_INTEGRITY="${{ steps.runner_pack_sha.outputs.runner_integrity }}"
          RUNNER_SHA256="${{ steps.runner_pack_sha.outputs.runner_sha256 }}"
          echo "---- runner-local pack (captured before publish) ----"
          echo "sha1:      ${RUNNER_SHA1}"
          echo "integrity: ${RUNNER_INTEGRITY}"
          echo "sha256:    ${RUNNER_SHA256}"
          echo "---- npm registry truth (post-publish) ----"
          REGISTRY_JSON="$(npm view "agentxchain@${VERSION}" dist --json 2>/dev/null || true)"
          if [[ -z "$REGISTRY_JSON" ]]; then
            echo "::warning::Could not fetch registry dist metadata for agentxchain@${VERSION} (diagnostic step is non-fatal)."
            exit 0
          fi
          echo "$REGISTRY_JSON"
          REGISTRY_SHA1="$(node -e "let d=JSON.parse(process.argv[1]);process.stdout.write(d.shasum||'')" "$REGISTRY_JSON")"
          REGISTRY_INTEGRITY="$(node -e "let d=JSON.parse(process.argv[1]);process.stdout.write(d.integrity||'')" "$REGISTRY_JSON")"
          echo "---- diagnostic verdict (NOT a gate) ----"
          if [[ -z "$REGISTRY_SHA1" ]]; then
            echo "registry dist.shasum unavailable; skipping comparison."
          elif [[ "$RUNNER_SHA1" == "unknown" ]]; then
            echo "runner pack SHA unavailable; skipping comparison."
          elif [[ "$RUNNER_SHA1" == "$REGISTRY_SHA1" ]]; then
            echo "PACK_SHA_DIAGNOSTIC: MATCH — runner-local pack sha1 equals registry dist.shasum for agentxchain@${VERSION}."
          else
            echo "PACK_SHA_DIAGNOSTIC: MISMATCH — runner-local pack sha1 (${RUNNER_SHA1}) differs from registry dist.shasum (${REGISTRY_SHA1}) for agentxchain@${VERSION}. Informational only; investigate before designing any reproducible-publish gate."
          fi
          if [[ -n "$REGISTRY_INTEGRITY" && "$RUNNER_INTEGRITY" != "unknown" && -n "$RUNNER_INTEGRITY" ]]; then
            if [[ "$RUNNER_INTEGRITY" == "$REGISTRY_INTEGRITY" ]]; then
              echo "PACK_INTEGRITY_DIAGNOSTIC: MATCH — runner-local pack integrity equals registry dist.integrity."
            else
              echo "PACK_INTEGRITY_DIAGNOSTIC: MISMATCH — runner (${RUNNER_INTEGRITY}) vs registry (${REGISTRY_INTEGRITY})."
            fi
          fi
          # Diagnostic only — exit 0 regardless of mismatch.
          exit 0

      - name: Sync Homebrew formula from npm registry
        id: homebrew
        if: always() && (steps.registry.outputs.already_published == 'true' || success())
        working-directory: cli
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          PUSH_FLAG=""
          if [[ -n "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            PUSH_FLAG="--push-tap"
            echo "tap_pushed=true" >> "$GITHUB_OUTPUT"
            echo "HOMEBREW_TAP_TOKEN available — will push to canonical tap."
          else
            echo "tap_pushed=false" >> "$GITHUB_OUTPUT"
            echo "WARNING: HOMEBREW_TAP_TOKEN not configured — syncing repo mirror only."
            echo "The canonical tap at shivamtiwari93/homebrew-tap must be updated manually."
          fi
          bash scripts/sync-homebrew.sh --target-version "${RELEASE_TAG#v}" $PUSH_FLAG

      - name: Commit Homebrew mirror updates (direct push only)
        id: homebrew_pr
        if: always() && (steps.registry.outputs.already_published == 'true' || success())
        working-directory: cli
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          REPO_PUSH_TOKEN: ${{ secrets.REPO_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          echo "pr_number=" >> "$GITHUB_OUTPUT"
          echo "direct_push=false" >> "$GITHUB_OUTPUT"
          if git diff --quiet homebrew/; then
            echo "Homebrew mirror already in sync — no commit needed."
            exit 0
          fi
          # Snapshot mutated mirror files before branch switching
          TMP_FORMULA="$(mktemp)"
          TMP_README="$(mktemp)"
          cp homebrew/agentxchain.rb "$TMP_FORMULA"
          cp homebrew/README.md "$TMP_README"
          git fetch origin main
          git restore --worktree --staged homebrew/agentxchain.rb homebrew/README.md

          # --- Primary path: direct push to main ---
          # Token priority: REPO_PUSH_TOKEN (admin PAT) > GITHUB_TOKEN (workflow token
          # with contents:write) > HOMEBREW_TAP_TOKEN (tap-scoped, usually lacks repo access).
          # GITHUB_TOKEN can push to main when branch protection allows GitHub Actions
          # bypass, which is the common case when enforce_admins is false.
          DIRECT_PUSH_OK=false
          PUSH_TOKEN=""
          PUSH_TOKEN_NAME=""
          if [[ -n "${REPO_PUSH_TOKEN:-}" ]]; then
            PUSH_TOKEN="${REPO_PUSH_TOKEN}"
            PUSH_TOKEN_NAME="REPO_PUSH_TOKEN"
          elif [[ -n "${GH_TOKEN:-}" ]]; then
            PUSH_TOKEN="${GH_TOKEN}"
            PUSH_TOKEN_NAME="GITHUB_TOKEN"
          elif [[ -n "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            PUSH_TOKEN="${HOMEBREW_TAP_TOKEN}"
            PUSH_TOKEN_NAME="HOMEBREW_TAP_TOKEN"
          fi
          if [[ -n "${PUSH_TOKEN:-}" ]]; then
            echo "Attempting direct push to main using ${PUSH_TOKEN_NAME}..."
            git switch -C "tmp-homebrew-direct-push" origin/main
            cp "$TMP_FORMULA" homebrew/agentxchain.rb
            cp "$TMP_README" homebrew/README.md
            if git diff --quiet homebrew/; then
              echo "Homebrew mirror update already present on main — no commit needed."
              rm -f "$TMP_FORMULA" "$TMP_README"
              exit 0
            fi
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add homebrew/agentxchain.rb homebrew/README.md
            git commit -m "chore: sync Homebrew formula for v${RELEASE_TAG#v}"
            REPO_SLUG="${GITHUB_REPOSITORY}"
            PUSH_URL="https://x-access-token:${PUSH_TOKEN}@github.com/${REPO_SLUG}.git"
            if git push "$PUSH_URL" HEAD:main 2>/dev/null; then
              echo "Direct push to main succeeded via ${PUSH_TOKEN_NAME} — no PR needed."
              echo "direct_push=true" >> "$GITHUB_OUTPUT"
              DIRECT_PUSH_OK=true
            else
              echo "Direct push to main failed for ${PUSH_TOKEN_NAME}. Falling back to PR path."
            fi
            # Reset to detached state for potential PR fallback
            git checkout --detach 2>/dev/null || true
          fi

          # --- Fallback: warn and skip ---
          # When direct push fails (branch protection blocks GITHUB_TOKEN), do NOT
          # create a PR. The canonical Homebrew tap is already updated by sync-homebrew.sh.
          # The repo mirror is a reference copy — agents sync it during release follow-up.
          # Creating PRs that can't self-merge wastes CI time every release.
          if [[ "$DIRECT_PUSH_OK" == "false" ]]; then
            echo "::warning::Homebrew mirror direct push failed. Canonical tap is already correct. Agents will sync the repo mirror on the next push. To enable direct push, configure REPO_PUSH_TOKEN (admin PAT with contents:write and branch-protection bypass)."
          fi
          rm -f "$TMP_FORMULA" "$TMP_README"

      - name: Create GitHub Release
        if: always() && (steps.registry.outputs.already_published == 'true' || success())
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${RELEASE_TAG}"
          NOTES_FILE="$(mktemp)"
          node cli/scripts/render-github-release-body.mjs \
            --target-version "${RELEASE_TAG#v}" \
            --repo "${GITHUB_REPOSITORY}" > "$NOTES_FILE"
          if gh release view "$TAG" --json tagName -q '.tagName' >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --draft=false
            echo "GitHub Release $TAG already exists — updated release body and ensured non-draft."
          else
            gh release create "$TAG" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --verify-tag
            echo "Created GitHub Release $TAG."
          fi
          rm -f "$NOTES_FILE"

      - name: Verify release completeness
        if: always() && (steps.registry.outputs.already_published == 'true' || success())
        working-directory: cli
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_DOWNSTREAM_RETRY_ATTEMPTS: 6
          RELEASE_DOWNSTREAM_RETRY_DELAY_SECONDS: 10
        run: |
          set -euo pipefail
          if [[ "${{ steps.homebrew.outputs.tap_pushed }}" == "true" ]]; then
            echo "Canonical tap push ran in CI — verifying all downstream surfaces..."
          else
            echo "Canonical tap push did not run in CI for this attempt — verifying downstream surfaces directly."
          fi
          bash scripts/release-downstream-truth.sh --target-version "${RELEASE_TAG#v}"
