name: Publish NPM Package

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag in vX.Y.Z format
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: npm-publish-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout tagged release
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: cli/package-lock.json

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Publish to npm
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! "$RELEASE_TAG" =~ ^v([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "Error: release tag must match v<semver>; got '${RELEASE_TAG}'" >&2
            exit 1
          fi

          RELEASE_VERSION="${BASH_REMATCH[1]}"
          PACKAGE_NAME="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).name)")"
          PACKAGE_VERSION="$(node -e "console.log(JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version)")"

          if [[ "$PACKAGE_VERSION" != "$RELEASE_VERSION" ]]; then
            echo "Error: package.json version is ${PACKAGE_VERSION}, expected ${RELEASE_VERSION} from ${RELEASE_TAG}" >&2
            exit 1
          fi

          echo "Publishing ${PACKAGE_NAME}@${RELEASE_VERSION} from ${RELEASE_TAG}"

          # setup-node creates .npmrc at repo root for registry auth.
          # Move it out before preflight so strict git-status passes, then restore for publish.
          NPMRC_BAK="${RUNNER_TEMP}/.npmrc.bak"
          if [[ -f "${GITHUB_WORKSPACE}/.npmrc" ]]; then
            mv "${GITHUB_WORKSPACE}/.npmrc" "$NPMRC_BAK"
          fi

          echo "Running strict release preflight..."
          bash scripts/release-preflight.sh --strict --target-version "${RELEASE_VERSION}"

          # Restore .npmrc for npm publish auth
          if [[ -f "$NPMRC_BAK" ]]; then
            mv "$NPMRC_BAK" "${GITHUB_WORKSPACE}/.npmrc"
          fi

          echo "Running npm publish with NPM_TOKEN..."
          npm publish --access public

          echo "Verifying registry visibility..."
          for attempt in $(seq 1 12); do
            PUBLISHED_VERSION="$(npm view "${PACKAGE_NAME}@${RELEASE_VERSION}" version 2>/dev/null || true)"
            if [[ "$PUBLISHED_VERSION" == "$RELEASE_VERSION" ]]; then
              echo "Verified ${PACKAGE_NAME}@${RELEASE_VERSION} on npm (attempt ${attempt}/12)"
              exit 0
            fi

            if [[ "$attempt" -lt 12 ]]; then
              echo "Registry not updated yet (attempt ${attempt}/12); retrying in 5s..."
              sleep 5
            fi
          done

          echo "Error: npm registry did not serve ${PACKAGE_NAME}@${RELEASE_VERSION} after 12 attempts" >&2
          exit 1
