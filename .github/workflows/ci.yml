name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - run: npm test
      - run: node bin/agentxchain.js verify protocol --tier 3 --target ..

  baby-tracker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/Baby Tracker/baby-tracker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/Baby Tracker/baby-tracker/package-lock.json
      - run: npm ci
      - run: npm test
