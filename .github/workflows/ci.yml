name: CI

on:
  pull_request:

jobs:
  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - run: npm ci
      - name: Install MCP example deps
        run: |
          for dir in ../examples/mcp-echo-agent ../examples/mcp-http-echo-agent; do
            if [ -f "$dir/package.json" ]; then
              (cd "$dir" && npm install --ignore-scripts --userconfig /dev/null)
            fi
          done
      - run: npm test
      - run: node bin/agentxchain.js verify protocol --tier 3 --target ..

  baby-tracker:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/Baby Tracker/baby-tracker
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: examples/Baby Tracker/baby-tracker/package-lock.json
      - run: npm ci
      - run: npm test
