name: Governed Todo App Proof

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  governed-todo-app-proof:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: cli/package-lock.json
      - name: Install CLI dependencies
        run: cd cli && npm ci
      - name: Run governed todo app proof (text)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node examples/governed-todo-app/run-auto.mjs
      - name: Run governed todo app proof (JSON)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node examples/governed-todo-app/run-auto.mjs --json
