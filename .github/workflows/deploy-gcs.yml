name: Deploy Website to GCP GCS

on:
  push:
    branches:
      - main
    paths:
      - 'website-v2/**'
  workflow_dispatch:

concurrency:
  group: gcs-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'website-v2/package-lock.json'

      - name: Install dependencies
        working-directory: website-v2
        run: npm ci

      - name: Build Docusaurus
        working-directory: website-v2
        run: npm run build

      - name: Authenticate to GCP
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # GCS bucket: agentxchain.dev in project apps1008com
      # Docusaurus generates content-hashed filenames for JS/CSS bundles
      # (e.g., assets/js/main.abc123.js) — these are safe to cache aggressively.
      # HTML files get short cache TTLs so content updates propagate quickly.
      #
      # Important: `gsutil rsync -h` only applies headers to rewritten objects.
      # We explicitly correct metadata after sync so stale cache headers from
      # older deploy strategies do not survive indefinitely.

      - name: Sync hashed assets (long cache)
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'agentxchain.dev' }}
        run: |
          gsutil -m -h "Cache-Control:public, max-age=31536000, immutable" \
            rsync -r -d \
            website-v2/build/assets/ \
            gs://${GCS_BUCKET}/assets/

      - name: Sync HTML and non-hashed files (short cache)
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'agentxchain.dev' }}
        run: |
          gsutil -m -h "Cache-Control:public, max-age=300, s-maxage=60" \
            rsync -r -d \
            -x "^assets/" \
            website-v2/build/ \
            gs://${GCS_BUCKET}/

      - name: Enforce cache metadata on assets
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'agentxchain.dev' }}
        shell: bash
        run: |
          mapfile -t asset_objects < <(gsutil ls -r "gs://${GCS_BUCKET}/assets/**" 2>/dev/null | grep -v '/$' || true)
          if [ "${#asset_objects[@]}" -gt 0 ]; then
            printf '%s\n' "${asset_objects[@]}" | xargs -n 100 gsutil -m setmeta -h "Cache-Control:public, max-age=31536000, immutable"
          fi

      - name: Enforce cache metadata on mutable objects
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'agentxchain.dev' }}
        shell: bash
        run: |
          mapfile -t mutable_objects < <(gsutil ls -r "gs://${GCS_BUCKET}/**" 2>/dev/null | grep -v '/$' | grep -v '/assets/' || true)
          if [ "${#mutable_objects[@]}" -gt 0 ]; then
            printf '%s\n' "${mutable_objects[@]}" | xargs -n 100 gsutil -m setmeta -h "Cache-Control:public, max-age=300, s-maxage=60"
          fi

      - name: Verify deployment
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET || 'agentxchain.dev' }}
        run: |
          echo "Deployed to gs://${GCS_BUCKET}/"
          gsutil ls gs://${GCS_BUCKET}/ | head -20
          echo ""
          echo "HTML files:"
          gsutil ls -r gs://${GCS_BUCKET}/**/*.html | wc -l
          echo ""
          echo "Asset bundles:"
          gsutil ls gs://${GCS_BUCKET}/assets/ 2>/dev/null | head -10 || echo "(none)"
          echo ""
          echo "Cache metadata checks:"
          gsutil stat gs://${GCS_BUCKET}/index.html | grep "Cache-Control" || true
          first_asset="$(gsutil ls gs://${GCS_BUCKET}/assets/** 2>/dev/null | grep -v '/$' | head -n 1 || true)"
          if [ -n "$first_asset" ]; then
            gsutil stat "$first_asset" | grep "Cache-Control" || true
          fi
