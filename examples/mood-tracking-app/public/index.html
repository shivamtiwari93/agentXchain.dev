<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mood Tracker</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; max-width: 560px; margin: 0 auto; padding: 1rem; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    .mood-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; }
    .mood-btn { padding: 0.6rem 1rem; border: 1px solid #ccc; border-radius: 8px; background: #f8f8f8; cursor: pointer; }
    .mood-btn:hover { background: #eee; }
    .mood-btn.selected { background: #e0f0ff; border-color: #069; }
    .mood-btn:focus-visible, button[type="submit"]:focus-visible, .filters button:focus-visible { outline: 2px solid #069; outline-offset: 2px; }
    input, textarea { width: 100%; padding: 0.5rem; margin-bottom: 0.5rem; border-radius: 6px; border: 1px solid #ccc; }
    textarea { min-height: 60px; resize: vertical; }
    button[type="submit"] { padding: 0.5rem 1rem; background: #069; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    section { margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid #eee; }
    .entry { padding: 0.5rem 0; border-bottom: 1px solid #f0f0f0; font-size: 0.9rem; }
    .entry .mood { font-weight: 600; }
    .entry .meta { color: #666; font-size: 0.8rem; }
    .insight-box { background: #f5f5f5; padding: 1rem; border-radius: 8px; margin-top: 0.5rem; }
    .error { color: #c00; font-size: 0.9rem; }
    .filters { display: flex; flex-wrap: wrap; gap: 0.5rem; align-items: flex-end; margin-bottom: 0.75rem; }
    .filters label { font-size: 0.85rem; }
    .filters input { width: auto; margin-bottom: 0; }
    .filters button { padding: 0.4rem 0.75rem; background: #444; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>Mood Tracker</h1>
  <p>Log how you feel in one tap. Optional note and tags.</p>

  <form id="log-form">
    <div class="mood-row" role="group" aria-label="Mood">
      <button type="button" class="mood-btn" data-mood="great" aria-pressed="false">Great</button>
      <button type="button" class="mood-btn" data-mood="good" aria-pressed="false">Good</button>
      <button type="button" class="mood-btn" data-mood="okay" aria-pressed="false">Okay</button>
      <button type="button" class="mood-btn" data-mood="low" aria-pressed="false">Low</button>
      <button type="button" class="mood-btn" data-mood="anxious" aria-pressed="false">Anxious</button>
    </div>
    <input type="hidden" name="mood" id="mood" required />
    <label for="note">Note (optional)</label>
    <textarea id="note" name="note" placeholder="Quick note..."></textarea>
    <label for="tags">Tags (optional, comma-separated)</label>
    <input type="text" id="tags" name="tags" placeholder="e.g. work, sleep, exercise" />
    <button type="submit">Log mood</button>
  </form>
  <p id="form-error" class="error" aria-live="polite"></p>

  <section aria-label="Insight">
    <h2>Insight</h2>
    <div id="insight" class="insight-box">Loading…</div>
  </section>

  <section aria-label="History">
    <h2>History</h2>
    <div class="filters" aria-label="Filter history">
      <label for="filter-from">From (date)</label>
      <input type="date" id="filter-from" />
      <label for="filter-to">To (date)</label>
      <input type="date" id="filter-to" />
      <label for="filter-tag">Tag</label>
      <input type="text" id="filter-tag" placeholder="e.g. work" />
      <button type="button" id="apply-filters">Apply</button>
    </div>
    <div id="history">Loading…</div>
  </section>

  <script>
    const API = '';
    const moodBtns = document.querySelectorAll('.mood-btn');
    const moodInput = document.getElementById('mood');
    const form = document.getElementById('log-form');
    const formError = document.getElementById('form-error');
    const insightEl = document.getElementById('insight');
    const historyEl = document.getElementById('history');

    moodBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        moodBtns.forEach(b => { b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); });
        btn.classList.add('selected');
        btn.setAttribute('aria-pressed', 'true');
        moodInput.value = btn.dataset.mood;
        formError.textContent = '';
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      formError.textContent = '';
      const mood = moodInput.value.trim();
      if (!mood) {
        formError.textContent = 'Please select a mood.';
        return;
      }
      const note = document.getElementById('note').value.trim() || undefined;
      const tagsRaw = document.getElementById('tags').value.trim();
      const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(Boolean) : undefined;
      try {
        const res = await fetch(API + '/api/mood', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mood, note, tags }),
          credentials: 'include'
        });
        const data = await res.json();
        if (!res.ok) {
          formError.textContent = data.error || 'Failed to log mood.';
          return;
        }
        moodBtns.forEach(b => { b.classList.remove('selected'); b.setAttribute('aria-pressed', 'false'); });
        moodInput.value = '';
        document.getElementById('note').value = '';
        document.getElementById('tags').value = '';
        loadHistory();
        loadInsight();
      } catch (err) {
        formError.textContent = 'Network error. Is the server running?';
      }
    });

    async function loadInsight() {
      try {
        const res = await fetch(API + '/api/insight', { credentials: 'include' });
        const data = await res.json();
        if (data.message) {
          insightEl.textContent = data.message;
          return;
        }
        const i = data.insight;
        if (!i) {
          insightEl.textContent = 'Log at least one mood to see insights.';
          return;
        }
        const parts = [];
        if (i.most_common_mood) parts.push(`Most common mood: ${i.most_common_mood}`);
        if (i.week_over_week != null) parts.push(`Week vs last week: ${Number(i.week_over_week) > 0 ? '+' : ''}${i.week_over_week}`);
        parts.push(`Entries this week: ${i.entries_this_week || 0}, total: ${i.total_entries || 0}`);
        insightEl.textContent = parts.join(' · ');
      } catch {
        insightEl.textContent = 'Could not load insight.';
      }
    }

    function historyQuery() {
      const from = document.getElementById('filter-from').value;
      const to = document.getElementById('filter-to').value;
      const tag = document.getElementById('filter-tag').value.trim();
      const params = new URLSearchParams();
      if (from) params.set('from', String(new Date(from).getTime()));
      if (to) params.set('to', String(new Date(to).setHours(23, 59, 59, 999)));
      if (tag) params.set('tag', tag);
      return params.toString();
    }

    async function loadHistory() {
      try {
        const qs = historyQuery();
        const url = API + '/api/mood' + (qs ? '?' + qs : '');
        const res = await fetch(url, { credentials: 'include' });
        const data = await res.json();
        const entries = data.entries || [];
        if (entries.length === 0) {
          historyEl.innerHTML = '<p>No entries yet. Log a mood above.</p>';
          return;
        }
        historyEl.innerHTML = entries.map(e => {
          const date = new Date(e.created_at).toLocaleString();
          const tagsStr = Array.isArray(e.tags) && e.tags.length ? ` · ${e.tags.join(', ')}` : '';
          return `<div class="entry"><span class="mood">${e.mood}</span>${e.note ? ` — ${e.note}` : ''}<div class="meta">${date}${tagsStr}</div></div>`;
        }).join('');
      } catch {
        historyEl.innerHTML = '<p>Could not load history.</p>';
      }
    }

    document.getElementById('apply-filters').addEventListener('click', loadHistory);
    document.getElementById('filter-from').addEventListener('change', loadHistory);
    document.getElementById('filter-to').addEventListener('change', loadHistory);

    loadInsight();
    loadHistory();
  </script>
</body>
</html>
